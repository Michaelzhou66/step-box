<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>步数盲盒挑战</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 30px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 22px;
      opacity: 0.92;
      font-size: 14px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .draw-btn {
      background: #ff8a00;
      color: #fff;
      min-width: 108px;
    }

    .box {
      width: 220px;
      height: 220px;
      margin: 18px auto 16px;
      background: #fff;
      color: #333;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px;
      font-size: 30px;
      font-weight: bold;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }

    .result {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      min-height: 30px;
      margin-bottom: 10px;
    }

    .status {
      text-align: center;
      font-size: 14px;
      opacity: 0.92;
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 16px;
      margin-top: 18px;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 0 0 12px;
    }

    .steps-left {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      white-space: nowrap;
    }

    .tag.empty {
      opacity: 0.6;
      text-decoration: line-through;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      color: #333;
      border-radius: 16px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
      font-size: 15px;
    }

    th {
      background: #f5f6fb;
      font-weight: bold;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .rank-1 td {
      background: #fff7d6;
      font-weight: bold;
    }

    .rank-2 td {
      background: #f3f6fb;
    }

    .rank-3 td {
      background: #fff1e8;
    }

    .empty-row {
      color: #777;
    }

    .hint {
      font-size: 13px;
      opacity: 0.9;
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 16px;
        border-radius: 18px;
      }

      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 13px;
      }

      .input-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .box {
        width: 180px;
        height: 180px;
        font-size: 24px;
      }

      th, td {
        padding: 10px 6px;
        font-size: 14px;
      }

      .section-title {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎁 步数盲盒挑战</h1>
    <div class="subtitle">输入姓名后抽取，每人仅可抽一次，库存与排行榜实时同步</div>

    <div class="input-row">
      <input id="nameInput" type="text" placeholder="请输入姓名" />
      <button class="draw-btn" onclick="draw()">立即抽取</button>
    </div>

    <div class="box" id="box">准备抽盲盒</div>
    <div class="result" id="result"></div>
    <div class="status" id="status">正在同步数据...</div>

    <div class="panel">
      <div class="section-title">📦 当前剩余库存</div>
      <div class="steps-left" id="stepsLeft"></div>
      <div class="hint">库存会实时更新，别人抽走后这里会自动变化。</div>
    </div>

    <div class="panel">
      <div class="section-title">🏆 步数目标榜</div>
      <table>
        <thead>
          <tr>
            <th>排名</th>
            <th>姓名</th>
            <th>抽中步数</th>
          </tr>
        </thead>
        <tbody id="recordBody">
          <tr class="empty-row">
            <td colspan="3">暂无记录</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      collection,
      onSnapshot,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 替换成你自己的 Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyC8inee_2PVRm0D-YHMk6H0qJUvzexdij8",
      authDomain: "step-boxes.firebaseapp.com",
      projectId: "step-boxes",
      storageBucket: "step-boxes.firebasestorage.app",
      messagingSenderId: "326761341792",
      appId: "1:326761341792:web:559fcafb1ca0bfc34b7405"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const boxEl = document.getElementById("box");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");
    const stepsLeftEl = document.getElementById("stepsLeft");
    const recordBodyEl = document.getElementById("recordBody");
    const nameInputEl = document.getElementById("nameInput");

    function renderInventory(steps) {
      stepsLeftEl.innerHTML = "";

      const ordered = Object.keys(steps).sort((a, b) => Number(a) - Number(b));
      let total = 0;

      ordered.forEach(step => {
        const count = steps[step];
        total += count;

        const tag = document.createElement("div");
        tag.className = "tag" + (count === 0 ? " empty" : "");
        tag.textContent = `${step} 步 × ${count}`;
        stepsLeftEl.appendChild(tag);
      });

      statusEl.textContent = `当前剩余 ${total} 个盲盒档位`;
    }

    function renderRecords(records) {
      recordBodyEl.innerHTML = "";

      if (records.length === 0) {
        recordBodyEl.innerHTML = `
          <tr class="empty-row">
            <td colspan="3">暂无记录</td>
          </tr>
        `;
        return;
      }

      records.sort((a, b) => Number(b.step) - Number(a.step));

      records.forEach((item, index) => {
        const tr = document.createElement("tr");
        if (index === 0) tr.classList.add("rank-1");
        if (index === 1) tr.classList.add("rank-2");
        if (index === 2) tr.classList.add("rank-3");

        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${item.name}</td>
          <td>${item.step} 步</td>
        `;
        recordBodyEl.appendChild(tr);
      });
    }

    async function loadAllRecords() {
      const snapshot = await getDocs(collection(db, "records"));
      const records = [];
      snapshot.forEach(docItem => records.push(docItem.data()));
      renderRecords(records);
    }

    // 实时监听库存变化
    onSnapshot(doc(db, "config", "steps"), (snapshot) => {
      if (!snapshot.exists()) {
        statusEl.textContent = "未找到库存配置，请先检查 Firestore 中的 config/steps";
        return;
      }
      const data = snapshot.data();
      renderInventory(data.steps);
    });

    // 实时监听排行榜变化
    onSnapshot(collection(db, "records"), (snapshot) => {
      const records = [];
      snapshot.forEach(docItem => records.push(docItem.data()));
      renderRecords(records);
    });

    // 抽奖
    window.draw = async function () {
      const name = nameInputEl.value.trim();

      if (!name) {
        alert("请输入姓名");
        return;
      }

      boxEl.textContent = "🎲 抽取中...";
      resultEl.textContent = "";

      const configRef = doc(db, "config", "steps");
      const recordRef = doc(db, "records", name);

      try {
        const [configSnap, recordSnap] = await Promise.all([
          getDoc(configRef),
          getDoc(recordRef)
        ]);

        if (!configSnap.exists()) {
          alert("未找到库存配置，请检查 Firestore");
          boxEl.textContent = "配置缺失";
          return;
        }

        if (recordSnap.exists()) {
          alert("该姓名已经抽过了");
          boxEl.textContent = "已抽过";
          return;
        }

        const steps = configSnap.data().steps;
        const pool = [];

        Object.keys(steps).forEach(step => {
          for (let i = 0; i < steps[step]; i++) {
            pool.push(step);
          }
        });

        if (pool.length === 0) {
          alert("所有步数档位都已经抽完了");
          boxEl.textContent = "已抽完";
          return;
        }

        const selectedStep = pool[Math.floor(Math.random() * pool.length)];
        steps[selectedStep] -= 1;

        await updateDoc(configRef, { steps });
        await setDoc(recordRef, {
          name,
          step: Number(selectedStep),
          createdAt: Date.now()
        });

        boxEl.textContent = `${selectedStep} 步`;
        resultEl.textContent = `恭喜 ${name} 抽中了 ${selectedStep} 步！`;
        nameInputEl.value = "";
      } catch (error) {
        console.error(error);
        alert("抽取失败，请检查 Firebase 配置或数据库权限");
        boxEl.textContent = "抽取失败";
      }
    };

    // 回车抽取
    nameInputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        draw();
      }
    });

    // 初始加载一次，避免极短暂空白
    loadAllRecords();
  </script>
</body>
</html>
