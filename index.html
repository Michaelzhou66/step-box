<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>步数盲盒挑战</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 24px;
      opacity: 0.9;
      font-size: 15px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      min-width: 220px;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .draw-btn {
      background: #ff8a00;
      color: #fff;
      font-weight: bold;
    }

    .reset-btn {
      background: #ffffff;
      color: #333;
      font-weight: bold;
    }

    .box {
      width: 220px;
      height: 220px;
      margin: 22px auto 18px;
      background: #fff;
      color: #333;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 16px;
      font-size: 30px;
      font-weight: bold;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }

    .result {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 18px;
      min-height: 30px;
    }

    .status {
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 22px;
    }

    .section-title {
      font-size: 18px;
      margin: 14px 0 10px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      color: #333;
      border-radius: 14px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f5f6fb;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .steps-left {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 26px;
      }

      .box {
        width: 180px;
        height: 180px;
        font-size: 26px;
      }

      button {
        width: 100%;
      }

      .input-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎁 步数盲盒挑战</h1>
    <div class="subtitle">输入姓名后抽取，每个步数只会被抽一次</div>

    <div class="input-row">
      <input id="nameInput" type="text" placeholder="请输入姓名" />
      <button class="draw-btn" onclick="drawStep()">立即抽取</button>
      <button class="reset-btn" onclick="resetGame()">重置</button>
    </div>

    <div class="box" id="box">准备抽盲盒</div>
    <div class="result" id="result"></div>
    <div class="status" id="status">当前还有 5 个步数档位未抽取</div>

    <div class="section-title">剩余档位</div>
    <div class="steps-left" id="stepsLeft"></div>

    <div class="section-title">抽取结果</div>
    <table>
      <thead>
        <tr>
          <th>排名</th>
          <th>姓名</th>
          <th>抽中步数</th>
        </tr>
      </thead>
      <tbody id="recordBody"></tbody>
    </table>
  </div>

  <script>
    const initialSteps = [3000, 5000, 7000, 10000, 12000];
    let remainingSteps = [...initialSteps];
    let records = [];

    function renderRemainingSteps() {
      const stepsLeft = document.getElementById("stepsLeft");
      stepsLeft.innerHTML = "";

      if (remainingSteps.length === 0) {
        stepsLeft.innerHTML = '<div class="tag">已全部抽完</div>';
        return;
      }

      remainingSteps
        .slice()
        .sort((a, b) => a - b)
        .forEach(step => {
          const tag = document.createElement("div");
          tag.className = "tag";
          tag.textContent = `${step} 步`;
          stepsLeft.appendChild(tag);
        });
    }

    function renderRecords() {
      const tbody = document.getElementById("recordBody");
      tbody.innerHTML = "";

      const sorted = [...records].sort((a, b) => b.step - a.step);

      if (sorted.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3">暂无记录</td></tr>';
        return;
      }

      sorted.forEach((item, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${item.name}</td>
          <td>${item.step} 步</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function updateStatus() {
      const status = document.getElementById("status");
      status.textContent = `当前还有 ${remainingSteps.length} 个步数档位未抽取`;
    }

    function drawStep() {
      const nameInput = document.getElementById("nameInput");
      const name = nameInput.value.trim();
      const box = document.getElementById("box");
      const result = document.getElementById("result");

      if (!name) {
        alert("请先输入姓名");
        return;
      }

      const alreadyDrawn = records.some(item => item.name === name);
      if (alreadyDrawn) {
        alert("该姓名已经抽过了");
        return;
      }

      if (remainingSteps.length === 0) {
        alert("所有步数档位都已经抽完了");
        return;
      }

      box.textContent = "🎲 抽取中...";
      result.textContent = "";

      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * remainingSteps.length);
        const selectedStep = remainingSteps[randomIndex];

        remainingSteps.splice(randomIndex, 1);
        records.push({ name, step: selectedStep });

        box.textContent = `${selectedStep} 步`;
        result.textContent = `恭喜 ${name} 抽中了 ${selectedStep} 步！`;

        nameInput.value = "";
        renderRemainingSteps();
        renderRecords();
        updateStatus();
      }, 900);
    }

    function resetGame() {
      remainingSteps = [...initialSteps];
      records = [];
      document.getElementById("nameInput").value = "";
      document.getElementById("box").textContent = "准备抽盲盒";
      document.getElementById("result").textContent = "";
      renderRemainingSteps();
      renderRecords();
      updateStatus();
    }

    renderRemainingSteps();
    renderRecords();
    updateStatus();
  </script>
</body>
</html>
