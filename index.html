<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>步数盲盒挑战（在线版）</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

input {
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: orange;
  color: white;
  cursor: pointer;
}

.box {
  margin: 20px auto;
  width: 200px;
  height: 200px;
  background: white;
  color: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  border-radius: 20px;
}

table {
  width: 100%;
  margin-top: 20px;
  background: white;
  color: black;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">
<h2>🎁 步数盲盒挑战</h2>

<input id="name" placeholder="请输入姓名">
<br><br>
<button onclick="draw()">抽取</button>

<div class="box" id="box">准备抽取</div>

<h3>排行榜</h3>
<table id="table"></table>
</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// ❗替换成你的配置
const firebaseConfig = {
  apiKey: "AIzaSyC8inee_2PVRm0D-YHMk6H0qJUvzexdij8",
  authDomain: "step-boxes.firebaseapp.com",
  projectId: "step-boxes"
  storageBucket: "step-boxes.firebasestorage.app",
  messagingSenderId: "326761341792",
  appId: "1:326761341792:web:559fcafb1ca0bfc34b7405"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🎲 抽奖
window.draw = async function() {

  const name = document.getElementById("name").value.trim();
  if (!name) return alert("请输入姓名");

  const configRef = doc(db, "config", "steps");
  const recordRef = doc(db, "records", name);

  const configSnap = await getDoc(configRef);
  const recordSnap = await getDoc(recordRef);

  if (recordSnap.exists()) {
    return alert("你已经抽过了");
  }

  let steps = configSnap.data().steps;

  let pool = [];
  Object.keys(steps).forEach(step => {
    for (let i = 0; i < steps[step]; i++) {
      pool.push(step);
    }
  });

  if (pool.length === 0) {
    return alert("抽完了");
  }

  const result = pool[Math.floor(Math.random() * pool.length)];

  steps[result]--;

  await updateDoc(configRef, { steps });
  await setDoc(recordRef, { name, step: result });

  document.getElementById("box").innerText = result + " 步";

  load();
};

// 📊 排行榜
async function load() {
  const snapshot = await getDocs(collection(db, "records"));
  let data = [];

  snapshot.forEach(doc => data.push(doc.data()));

  data.sort((a, b) => b.step - a.step);

  let html = "<tr><th>排名</th><th>姓名</th><th>步数</th></tr>";

  data.forEach((d, i) => {
    html += `<tr><td>${i+1}</td><td>${d.name}</td><td>${d.step}</td></tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

// 页面加载
window.onload = load;

</script>

</body>
</html>
